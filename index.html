<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyManus</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #172033;
      }

      body {
        margin: 0;
      }

      main {
        width: min(1080px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0 56px;
      }

      header {
        margin-bottom: 28px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 36px;
        font-weight: 780;
      }

      p {
        max-width: 760px;
        margin: 0;
        color: #4a5568;
        line-height: 1.6;
      }

      section {
        margin: 0 0 32px;
        padding: 20px;
        background: #ffffff;
        border: 1px solid #e3e7ef;
        border-radius: 8px;
      }

      h2 {
        margin: 0 0 14px;
        font-size: 20px;
        font-weight: 720;
      }

      video {
        display: block;
        width: 100%;
        max-height: 78vh;
        background: #000000;
        border-radius: 6px;
      }

      a {
        color: #0f62fe;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>MyManus</h1>
        <p>
          A web-first OpenManus fork with Microsoft Playwright MCP, StepSearch,
          Skills, attachments, and Word/Excel deliverables.
        </p>
      </header>

      <section id="luogu">
        <h2>洛谷全自动刷题任务</h2>
        <video controls preload="metadata" src="./demos/luogu-demo.mp4"></video>
      </section>

      <section id="doubao">
        <h2>自动与豆包对话并总结成Word任务</h2>
        <video controls preload="metadata" src="./demos/doubao-demo.mp4"></video>
      </section>

      <p>
        Source code:
        <a href="https://github.com/jason2003zzz-ai/MyManus">GitHub repository</a>
      </p>
    </main>
  </body>
</html>
