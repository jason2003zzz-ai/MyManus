<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyManus 演示视频</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #172033;
      }

      body {
        margin: 0;
      }

      main {
        width: min(1080px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0 56px;
      }

      h1 {
        margin: 0 0 24px;
        font-size: 32px;
        font-weight: 760;
      }

      section {
        margin: 0 0 32px;
        padding: 20px;
        background: #ffffff;
        border: 1px solid #e3e7ef;
        border-radius: 8px;
      }

      h2 {
        margin: 0 0 14px;
        font-size: 20px;
        font-weight: 720;
      }

      video {
        display: block;
        width: 100%;
        max-height: 78vh;
        background: #000000;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MyManus 演示视频</h1>

      <section id="luogu">
        <h2>洛谷全自动刷题任务</h2>
        <video controls preload="metadata" src="./luogu-demo.mp4"></video>
      </section>

      <section id="doubao">
        <h2>自动与豆包对话并总结成Word任务</h2>
        <video controls preload="metadata" src="./doubao-demo.mp4"></video>
      </section>

    </main>
  </body>
</html>
